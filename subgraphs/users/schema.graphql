extend schema
  @link(
    url: "https://specs.apollo.dev/federation/v2.10"
    import: ["@key", "@context", "@tag"]
  )

enum CacheControlScope {
  PUBLIC
  PRIVATE
}

directive @cacheControl(
  maxAge: Int
  scope: CacheControlScope
  inheritMaxAge: Boolean
) on FIELD_DEFINITION | OBJECT | INTERFACE | UNION

type Query {
  """
  Get the current user from our fake "auth" headers.
  Set the "x-user-id" header to the user id.
  """
  user: User @cacheControl(maxAge: 60, scope: PRIVATE)

  """
  List all users. Used for cache-key inspection tests that need to query
  multiple users (with different subscriptionType values) in a single request.
  """
  users: [User] @cacheControl(maxAge: 60, scope: PRIVATE)
}

"An user account in our system"
type User @key(fields: "id") @context(name: "userContext") @cacheControl(maxAge: 30) { # shippingAddress can change on profile update — keep short
  id: ID!

  """
  The users login username
  """
  username: String!

  """
  Get the list of last session id of user activity
  """
  previousSessions: [ID!]

  "Total saved loyalty points and rewards"
  loyaltyPoints: Int

  """
  Saved payment methods that can be used to submit orders
  """
  paymentMethods: [PaymentMethod]

  """
  The users previous purchases
  """
  orders: [Order] @cacheControl(inheritMaxAge: true)

  """
  The users current saved shipping address
  """
  shippingAddress: String

  """
  Fraud detection score for the user
  """
  fraudScore: Float @tag(name: "internal")

  """
  Users connected social accounts
  """
  socialAccounts: String @tag(name: "experimental")

  "Sub type"
  subscriptionType: SubscriptionType
}

type AdminUser @tag(name: "internal") {
  id: ID!
  name: String
}

"""
A saved payment option for an user
"""
type PaymentMethod {
  id: ID!
  name: String
  description: String
  type: PaymentType!
}

"""
A fix set of payment types that we accept
"""
enum PaymentType {
  CREDIT_CARD
  DEBIT_CARD
  BANK_ACCOUNT
}

enum SubscriptionType {
  SINGLE
  DOUBLE
}

type Order @key(fields: "id", resolvable: false) {
  id: ID!
}
