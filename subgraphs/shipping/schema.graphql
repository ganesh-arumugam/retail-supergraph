extend schema
  @link(
    url: "https://specs.apollo.dev/federation/v2.10"
    import: ["@key", "@external", "@requires"]
  )

enum CacheControlScope {
  PUBLIC
  PRIVATE
}

directive @cacheControl(
  maxAge: Int
  scope: CacheControlScope
  inheritMaxAge: Boolean
) on FIELD_DEFINITION | OBJECT | INTERFACE | UNION

"""
An order placed by a user.
TTL is set to 30s = min(User.shippingAddress TTL: 30s, Variant.weight TTL: 120s).
Rule: @requires means this type's TTL must be ≤ the shortest TTL among all required
input fields. If shippingAddress changes, the repr hash changes → automatic miss.
But if shippingAddress is still in cache with stale data, this cached entry would
also serve stale shippingCost. The 30s cap bounds that staleness window.
"""
type Order @key(fields: "id") @cacheControl(maxAge: 120) {
  id: ID!
  buyer: User! @external
  items: [Variant!]! @external
  

  """
  Calculate the cost to ship all the variants to the users address
  """
  shippingCost: Float
    @requires(fields: "items { weight } buyer { shippingAddress }")
}

type User @key(fields: "id", resolvable: false) {
  id: ID!
  shippingAddress: String @external
}

type Variant @key(fields: "id", resolvable: false) {
  id: ID!
  weight: Float @external
}
