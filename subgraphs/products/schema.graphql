extend schema
  @link(url: "https://specs.apollo.dev/federation/v2.10", import: ["@key", "@tag"])

enum CacheControlScope {
  PUBLIC
  PRIVATE
}

directive @cacheControl(
  maxAge: Int
  scope: CacheControlScope
  inheritMaxAge: Boolean
) on FIELD_DEFINITION | OBJECT | INTERFACE | UNION

# [REMOVED] Do NOT manually define @cacheTag here. Since it's imported from the federation spec
# above, redefining it with a different signature (name/field args) will cause a composition error.
# The federation @cacheTag takes a `format` argument, not `name` or `field`.

type Query {
  """
  List all available products without any search filters
  """
  # [FIX 3] Added @cacheTag to root field for tag-based invalidation.
  # format: "products" creates a static tag; use {$args.XXX} for argument interpolation.
  listAllProducts: [Product] @cacheControl(maxAge: 90)

  """
  Get all available products to shop for. Optionally provide some search filters
  """
  searchProducts(searchInput: ProductSearchInput! = {}): [Product]

  """
  Get all available variants of products to shop for. Optionally provide some search filters
  """
  searchVariants(searchInput: VariantSearchInput! = {}): [Variant]

  """
  Get a specific product by id. Useful for the product details page or checkout page
  """
  # [FIX 4] Added @cacheControl and tag on product(id) for targeted per-entity invalidation.
  # {$args.id} interpolates the `id` argument — must be non-nullable to be valid.
  product(id: ID!): Product @cacheControl(maxAge: 60)

  """
  Get a specific variant by id. Useful for the product details page or checkout page
  """
  variant(id: ID!): Variant @cacheControl(maxAge: 60)
}

"""
Search filters for when returning Products
"""
input ProductSearchInput {
  titleStartsWith: String
}

"""
Search filters for when returning Variants
"""
input VariantSearchInput {
  sizeStartsWith: String
}

"""
A specific product sold by our store.
"""
type Product
  @key(fields: "id")
  @key(fields: "upc")
  @tag(name: "partner")
  # NOTE: Do NOT add @cacheControl or @cacheTag at the type level here.
  # Federation 2.12 has a bug in its cache-tag validator that throws INTERNAL_ERROR when
  # a type carries any cache directive in one subgraph while another subgraph extends that
  # same type with @fromContext (see reviews subgraph). Cache TTLs are set on the root
  # fields (listAllProducts, product) and invalidation via root-field @cacheTag.
{
  id: ID!
  upc: ID!
  title: String
  description: String
  mediaUrl: String

  "Mock random date of when a product might be released"
  releaseDate: String

  """
  Variants of the products to view specific size/color/price options
  """
  variants(searchInput: VariantSearchInput = {}): [Variant]

  """
  Optional internal id to help categorize the product
  """
  internalId: ID! @tag(name: "internal")
}

"""
A variant of a product.
"""
type Variant
  @key(fields: "id")
  @cacheControl(maxAge: 120) # Catalog data — weight rarely changes; safe to cache longer
{
  id: ID!

  """
  Link back to the parent Product
  """
  product: Product
  colorway: String
  price: Float!
  size: String
  dimensions: String
  weight: Float
}
